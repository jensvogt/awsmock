name: Release + Build + Installer (Windows / macOS / Linux)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  APP_NAME: "awsmock"
  INSTALLER_ID: "de.jensvogt.awsmock"
  VCPKG_BUILD_TYPE: release
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write
  id-token: write
  pages: write

jobs:
  release-please:
    name: Create Release PR / Tag
    runs-on: ubuntu-latest

    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.strip_tag.outputs.clean_tag }}
      prs_created: ${{ steps.release.outputs.prs_created }}

    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: simple
          token: ${{ secrets.GH_AUTH_TOKEN }}

      - name: Strip leading 'v' from tag
        id: strip_tag
        run: |
          TAG="${{ steps.release.outputs.tag_name }}"
          CLEAN="${TAG#v}"   # remove leading 'v'
          echo "clean_tag=$CLEAN" >> $GITHUB_OUTPUT

  build-windows-msi:
    name: Build & Package (Windows MSI)
    runs-on: windows-latest
    needs: [ release-please ]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    env:
      VCPKG_ROOT: "${{ github.workspace }}/vcpkg"
      VCPKG_DEFAULT_BINARY_CACHE: "${{ github.workspace }}/vcpkg-bincache"
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg-bincache,readwrite"
      BUILD_DIR: "${{ github.workspace }}/cmake-build-release"
      PACKAGE_DIR: "${{ github.workspace }}/package-windows"
      SEMVER: ${{ needs.release-please.outputs.tag_name }}
      VCPKG_DEFAULT_TRIPLET: x64-windows-static
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup MSVC environment
        uses: step-security/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Create vcpkg binary cache dir
        shell: bash
        run: mkdir -p ${{ github.workspace }}/vcpkg-bincache

      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg-bincache
          key: vcpkg-${{ runner.os }}-${{ hashFiles('**/vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: "${{ github.workspace }}/vcpkg"
          vcpkgJsonGlob: '**/vcpkg.json'
          runVcpkgInstall: false

      - name: Build (Backend)
        shell: cmd
        run: |
          mkdir "${{ env.BUILD_DIR }}"
          cmake -B "${{ env.BUILD_DIR }}" -S . -DCMAKE_BUILD_TYPE=Release -DVCPKG_ROOT=${{ env.VCPKG_ROOT}} -DCMAKE_TOOLCHAIN_FILE="${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=${{ env.VCPKG_DEFAULT_TRIPLET }} -DVCPKG_DISABLE_AUTO_PACKAGE_REGISTRATION=ON
          cmake --build "${{ env.BUILD_DIR }}" --config Release --parallel 2

      - name: Build (Frontend)
        shell: pwsh
        run: |
          git clone https://github.com/jensvogt/awsmock-ui
          cd awsmock-ui
          npm install
          npm run build

      - name: Install NSIS
        run: |
          choco install nsis --no-progress -y
          echo "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH

      - name: Install NSIS plugins
        run: |
          $pluginDir = "C:\Program Files (x86)\NSIS\Plugins\x86-unicode"
          Copy-Item "${{ github.workspace }}\dist\msi\nsis\inetc.dll" "$pluginDir\"
          Copy-Item "${{ github.workspace }}\dist\msi\nsis\nsJSON.dll" "$pluginDir\"
          Copy-Item "${{ github.workspace }}\dist\msi\nsis\SimpleSC.dll" "$pluginDir\"

      - name: Build NSIS installer
        env:
          SRCDIR: ${{ github.workspace }}
        run: makensis /DSRCDIR=${{ github.workspace }} /DBUILDDIR="${{ env.BUILD_DIR }}" /DVERSION=${{ env.SEMVER }} dist\msi\product.nsi

      - name: Upload Windows installer
        uses: actions/upload-artifact@v7
        with:
          name: installer-windows
          path: ${{ env.APP_NAME }}-${{ env.SEMVER }}-amd64.exe
          overwrite: true

  build-macos:
    name: Build & Package (macOS)
    runs-on: macos-latest
    needs: [ release-please ]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    env:
      VCPKG_ROOT: "${{ github.workspace }}/vcpkg"
      VCPKG_DEFAULT_BINARY_CACHE: "${{ github.workspace }}/vcpkg-bincache"
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg-bincache,readwrite"
      BUILD_DIR: "${{ github.workspace }}/build-macos"
      PACKAGE_DIR: "${{ github.workspace }}/package-macos"
      SEMVER: ${{ needs.release-please.outputs.tag_name }}
      SERVICE_NAME: de.jensvogt.awsmock
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install system dependencies
        shell: bash
        run: |
          brew install doxygen pandoc file autoconf autoconf-archive automake libtool

      - name: Create vcpkg binary cache dir
        run: mkdir -p ${{ github.workspace }}/vcpkg-bincache

      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg-bincache
          key: vcpkg-${{ runner.os }}-${{ hashFiles('**/vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: ${{ env.VCPKG_ROOT }}

      - name: Build (Backend)
        run: |
          cmake -B ${{ env.BUILD_DIR }} -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake -DVCPKG_DISABLE_AUTO_PACKAGE_REGISTRATION=ON
          cmake --build ${{ env.BUILD_DIR }} --config Release

      - name: Build (Frontend)
        shell: bash
        run: |
          mkdir -p ${{ github.workspace }}/frontend
          cd ${{ github.workspace }}/frontend
          git clone https://github.com/jensvogt/awsmock-ui
          cd awsmock-ui
          npm install
          npm run build

      - name: Prepare package structure
        run: |
          mkdir -p ${{ env.PACKAGE_DIR }}/awsmock/bin
          mkdir -p ${{ env.PACKAGE_DIR }}/awsmock/etc
          mkdir -p ${{ env.PACKAGE_DIR }}/awsmock/log
          mkdir -p ${{ env.PACKAGE_DIR }}/awsmock/frontend
          mkdir -p ${{ env.PACKAGE_DIR }}/awsmock/data/s3
          mkdir -p ${{ env.PACKAGE_DIR }}/awsmock/data/sqs
          mkdir -p ${{ env.PACKAGE_DIR }}/awsmock/data/sns
          mkdir -p ${{ env.PACKAGE_DIR }}/awsmock/data/lambda
          mkdir -p ${{ env.PACKAGE_DIR }}/awsmock/data/application
          mkdir -p ${{ env.PACKAGE_DIR }}/awsmock/data/transfer
          mkdir -p ${{ env.PACKAGE_DIR }}/awsmock/data/backup
          mkdir -p ${{ env.PACKAGE_DIR }}/awsmock/data/tmp
          mkdir -p ${{ env.PACKAGE_DIR }}/awsmock/share/man/man1
          
          # Copy your app
          # TODO: add documentation: cp docs/man/*.1 ${{ env.PACKAGE_DIR }}/awsmock/share/man/man1
          cp ${{ env.BUILD_DIR }}/awsmockmgr ${{ env.PACKAGE_DIR }}/awsmock/bin/
          cp ${{ env.BUILD_DIR }}/awsmockctl ${{ env.PACKAGE_DIR }}/awsmock/bin/
          cp ${{ env.BUILD_DIR }}/awslocal ${{ env.PACKAGE_DIR }}/awsmock/bin/
          cp dist/etc/awsmock_macos.json ${{ env.PACKAGE_DIR }}/awsmock/etc/awsmock.json
          cp dist/etc/magic.mgc ${{ env.PACKAGE_DIR }}/awsmock/etc/magic.mgc
          cp dist/etc/ssh_host_key ${{ env.PACKAGE_DIR }}/awsmock/etc/ssh_host_key
          cp dist/etc/ca.pem ${{ env.PACKAGE_DIR }}/awsmock/etc/ca.pem
          cp dist/etc/cert.pem ${{ env.PACKAGE_DIR }}/awsmock/etc/cert.pem
          cp dist/etc/key.pem ${{ env.PACKAGE_DIR }}/awsmock/etc/key.pem
          cp dist/macos/de.jensvogt.awsmock.plist ${{ env.PACKAGE_DIR }}/awsmock/etc/
          cp -R ${{ github.workspace }}/frontend/awsmock-ui/dist/awsmock-ui/browser/* ${{ env.PACKAGE_DIR }}/awsmock/frontend

      - name: Create Launch Agent Plist
        run: |
          cat << EOF > ${{ env.PACKAGE_DIR }}/awsmock/etc/awsmock.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
            <dict>
               <key>Label</key>
               <string>${{ env.SERVICE_NAME }}</string>
               <key>ProgramArguments</key>
               <array>
                   <string>${{ env.EXECUTABLE_NAME }}</string>
                   <string>--config</string>
                   <string>$HOME/awsmock/etc/awsmock.json</string>
               </array>
               <key>RunAtLoad</key>
               <true/>
               <key>KeepAlive</key>
               <false/>
               <key>StandardOutPath</key>
               <string>/tmp/${{ env.SERVICE_NAME }}.log</string>
            </dict>
          </plist>
          EOF

      - name: Package Service Files
        run: |
          tar -czf ${{ env.APP_NAME }}-${{ env.SEMVER }}-macos.tgz -C ${{ env.PACKAGE_DIR }} .

      - name: Upload macOS ZIP
        uses: actions/upload-artifact@v7
        with:
          name: installer-macos
          path: ${{ env.APP_NAME }}-${{ env.SEMVER }}-macos.tgz

  build-linux:
    name: Build & Package (Linux DEB + RPM)
    runs-on: ubuntu-latest
    needs: [ release-please ]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    env:
      CXX: g++-14
      CC: gcc-14
      VCPKG_ROOT: "${{ github.workspace }}/vcpkg"
      VCPKG_DEFAULT_BINARY_CACHE: "${{ github.workspace }}/vcpkg-bincache"
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg-bincache,readwrite"
      BUILD_DIR: "${{ github.workspace }}/build-linux"
      PACKAGE_DIR_DEB: "${{ github.workspace }}/package-deb"
      PACKAGE_DIR_RPM: "${{ github.workspace }}/package-rpm"
      SEMVER: "${{ needs.release-please.outputs.tag_name }}"
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y ninja-build doxygen pandoc linux-libc-dev autoconf autoconf-archive automake libtool g++-14 rpm
          sudo gem install --no-document fpm

      - name: Create vcpkg binary cache dir
        run: mkdir -p ${{ github.workspace }}/vcpkg-bincache

      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg-bincache
          key: vcpkg-${{ runner.os }}-${{ hashFiles('**/vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: ${{ env.VCPKG_ROOT }}

      - name: Set g++-14 as default
        run: |
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 14
          sudo update-alternatives --set g++ /usr/bin/g++-14
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 14
          sudo update-alternatives --set gcc /usr/bin/gcc-14

      - name: Build (Backend)
        run: |
          mkdir ${{ env.BUILD_DIR }}
          cmake -B ${{ env.BUILD_DIR }} -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake
          cmake --build ${{ env.BUILD_DIR }} --config Release --parallel 2

      - name: Build (Frontend)
        shell: bash
        run: |
          mkdir -p ${{ github.workspace }}/frontend
          cd ${{ github.workspace }}/frontend
          git clone https://github.com/jensvogt/awsmock-ui
          cd awsmock-ui
          npm install
          npm run build

      # ── DEB ────────────────────────────────────────────────────────────────

      - name: Prepare DEB package structure
        run: |
          mkdir -p ${{ env.PACKAGE_DIR_DEB }}/DEBIAN
          mkdir -p ${{ env.PACKAGE_DIR_DEB }}/usr/local/awsmock/bin
          mkdir -p ${{ env.PACKAGE_DIR_DEB }}/usr/local/awsmock/etc
          mkdir -p ${{ env.PACKAGE_DIR_DEB }}/usr/local/awsmock/log
          mkdir -p ${{ env.PACKAGE_DIR_DEB }}/usr/local/awsmock/frontend
          mkdir -p ${{ env.PACKAGE_DIR_DEB }}/usr/local/awsmock/data/s3
          mkdir -p ${{ env.PACKAGE_DIR_DEB }}/usr/local/awsmock/data/sqs
          mkdir -p ${{ env.PACKAGE_DIR_DEB }}/usr/local/awsmock/data/sns
          mkdir -p ${{ env.PACKAGE_DIR_DEB }}/usr/local/awsmock/data/lambda
          mkdir -p ${{ env.PACKAGE_DIR_DEB }}/usr/local/awsmock/data/application
          mkdir -p ${{ env.PACKAGE_DIR_DEB }}/usr/local/share/man/man1
          mkdir -p ${{ env.PACKAGE_DIR_DEB }}/etc/systemd/system
          mkdir -p ${{ env.PACKAGE_DIR_DEB }}/etc/ld.so.conf.d

          cp ${{ env.BUILD_DIR }}/awsmockmgr ${{ env.PACKAGE_DIR_DEB }}/usr/local/awsmock/bin/
          cp ${{ env.BUILD_DIR }}/awsmockctl ${{ env.PACKAGE_DIR_DEB }}/usr/local/awsmock/bin/
          cp ${{ env.BUILD_DIR }}/awslocal ${{ env.PACKAGE_DIR_DEB }}/usr/local/awsmock/bin/
          cp dist/etc/awsmock_linux.json ${{ env.PACKAGE_DIR_DEB }}/usr/local/awsmock/etc/awsmock.json
          cp dist/etc/magic.mgc ${{ env.PACKAGE_DIR_DEB }}/usr/local/awsmock/etc/magic.mgc
          cp dist/etc/ssh_host_key ${{ env.PACKAGE_DIR_DEB }}/usr/local/awsmock/etc/ssh_host_key
          cp dist/etc/ca.pem ${{ env.PACKAGE_DIR_DEB }}/usr/local/awsmock/etc/ca.pem
          cp dist/etc/cert.pem ${{ env.PACKAGE_DIR_DEB }}/usr/local/awsmock/etc/cert.pem
          cp dist/etc/key.pem ${{ env.PACKAGE_DIR_DEB }}/usr/local/awsmock/etc/key.pem
          cp dist/etc/systemd/system/awsmock.service ${{ env.PACKAGE_DIR_DEB }}/etc/systemd/system
          cp docs/man/*.1 ${{ env.PACKAGE_DIR_DEB }}/usr/local/share/man/man1
          cp -R frontend/awsmock-ui/dist/awsmock-ui/browser/* ${{ env.PACKAGE_DIR_DEB }}/usr/local/awsmock/frontend

          cat << EOF > ${{ env.PACKAGE_DIR_DEB }}/DEBIAN/control
          Package: awsmock
          Version: ${SEMVER}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Jens Vogt <jens.vogt@opitz-consulting.com>
          Description: AWSMock local AWS emulator service
          Depends: systemd
          EOF

          cat << EOF > ${{ env.PACKAGE_DIR_DEB }}/DEBIAN/postinst
          #!/bin/bash
          set -e
          systemctl daemon-reload
          systemctl enable awsmock.service
          systemctl restart awsmock.service || true
          ldconfig
          EOF

          cat << EOF > ${{ env.PACKAGE_DIR_DEB }}/DEBIAN/postrm
          #!/bin/bash
          set -e
          systemctl stop awsmock.service || true
          systemctl disable awsmock.service || true
          rm -f /etc/systemd/system/awsmock.service
          rm -f /etc/ld.so.conf.d/awsmock.conf
          ldconfig
          EOF

          cat << EOF > ${{ env.PACKAGE_DIR_DEB }}/etc/ld.so.conf.d/awsmock.conf
          /usr/local/awsmock/lib
          EOF

          chmod 755 ${{ env.PACKAGE_DIR_DEB }}/DEBIAN/postinst ${{ env.PACKAGE_DIR_DEB }}/DEBIAN/postrm

      - name: Build DEB with fpm
        run: |
          fpm -s dir -t deb --name "${{ env.APP_NAME }}" \
          --version "${{ env.SEMVER }}" \
          --architecture amd64 \
          --package "${{ env.APP_NAME }}-${{ env.SEMVER }}-amd64.deb" \
          ${{ env.PACKAGE_DIR_DEB }}/=/

      - name: Upload .deb
        uses: actions/upload-artifact@v7
        with:
          name: deb-package-linux
          path: ${{ env.APP_NAME }}-${{ env.SEMVER }}-amd64.deb
          overwrite: true

      # ── RPM ────────────────────────────────────────────────────────────────

      - name: Prepare RPM package structure
        run: |
          mkdir -p ${{ env.PACKAGE_DIR_RPM }}/usr/local/awsmock/bin
          mkdir -p ${{ env.PACKAGE_DIR_RPM }}/usr/local/awsmock/etc
          mkdir -p ${{ env.PACKAGE_DIR_RPM }}/usr/local/awsmock/log
          mkdir -p ${{ env.PACKAGE_DIR_RPM }}/usr/local/awsmock/frontend
          mkdir -p ${{ env.PACKAGE_DIR_RPM }}/usr/local/awsmock/data/s3
          mkdir -p ${{ env.PACKAGE_DIR_RPM }}/usr/local/awsmock/data/sqs
          mkdir -p ${{ env.PACKAGE_DIR_RPM }}/usr/local/awsmock/data/sns
          mkdir -p ${{ env.PACKAGE_DIR_RPM }}/usr/local/awsmock/data/lambda
          mkdir -p ${{ env.PACKAGE_DIR_RPM }}/usr/local/awsmock/data/application
          mkdir -p ${{ env.PACKAGE_DIR_RPM }}/usr/local/share/man/man1
          mkdir -p ${{ env.PACKAGE_DIR_RPM }}/etc/systemd/system
          mkdir -p ${{ env.PACKAGE_DIR_RPM }}/etc/ld.so.conf.d
          mkdir -p ${{ env.PACKAGE_DIR_RPM }}/scripts

          cp ${{ env.BUILD_DIR }}/awsmockmgr ${{ env.PACKAGE_DIR_RPM }}/usr/local/awsmock/bin/
          cp ${{ env.BUILD_DIR }}/awsmockctl ${{ env.PACKAGE_DIR_RPM }}/usr/local/awsmock/bin/
          cp ${{ env.BUILD_DIR }}/awslocal ${{ env.PACKAGE_DIR_RPM }}/usr/local/awsmock/bin/
          cp dist/etc/awsmock_linux.json ${{ env.PACKAGE_DIR_RPM }}/usr/local/awsmock/etc/awsmock.json
          cp dist/etc/magic.mgc ${{ env.PACKAGE_DIR_RPM }}/usr/local/awsmock/etc/magic.mgc
          cp dist/etc/ssh_host_key ${{ env.PACKAGE_DIR_RPM }}/usr/local/awsmock/etc/ssh_host_key
          cp dist/etc/ca.pem ${{ env.PACKAGE_DIR_RPM }}/usr/local/awsmock/etc/ca.pem
          cp dist/etc/cert.pem ${{ env.PACKAGE_DIR_RPM }}/usr/local/awsmock/etc/cert.pem
          cp dist/etc/key.pem ${{ env.PACKAGE_DIR_RPM }}/usr/local/awsmock/etc/key.pem
          cp dist/etc/systemd/system/awsmock.service ${{ env.PACKAGE_DIR_RPM }}/etc/systemd/system
          cp docs/man/*.1 ${{ env.PACKAGE_DIR_RPM }}/usr/local/share/man/man1
          cp -R frontend/awsmock-ui/dist/awsmock-ui/browser/* ${{ env.PACKAGE_DIR_RPM }}/usr/local/awsmock/frontend

          cat << EOF > ${{ env.PACKAGE_DIR_RPM }}/scripts/postinstall.sh
          #!/bin/bash
          set -e
          systemctl daemon-reload
          systemctl enable awsmock.service
          systemctl restart awsmock.service || true
          ldconfig
          EOF

          cat << EOF > ${{ env.PACKAGE_DIR_RPM }}/scripts/postremove.sh
          #!/bin/bash
          systemctl stop awsmock.service || true
          systemctl disable awsmock.service || true
          rm -f /etc/systemd/system/awsmock.service
          systemctl daemon-reload
          rm -f /etc/ld.so.conf.d/awsmock.conf
          ldconfig
          EOF

          chmod +x ${{ env.PACKAGE_DIR_RPM }}/scripts/postinstall.sh ${{ env.PACKAGE_DIR_RPM }}/scripts/postremove.sh

          cat << EOF > ${{ env.PACKAGE_DIR_RPM }}/etc/ld.so.conf.d/awsmock.conf
          /usr/local/awsmock/lib
          EOF

      - name: Build RPM with fpm
        run: |
          fpm -s dir -t rpm \
          -n awsmock \
          -v ${SEMVER} \
          --description "AWSMock – Local AWS API mocking environment" \
          --url "https://github.com/jensvogt/awsmock" \
          --vendor "AWSMock Project" \
          --license "Apache-2.0" \
          --prefix / \
          --after-install ${{ env.PACKAGE_DIR_RPM }}/scripts/postinstall.sh \
          --after-remove ${{ env.PACKAGE_DIR_RPM }}/scripts/postremove.sh \
          ${{ env.PACKAGE_DIR_RPM }}/=/

      - name: Upload .rpm
        uses: actions/upload-artifact@v7
        with:
          name: rpm-package-linux
          path: ${{ env.APP_NAME }}-${{ env.SEMVER }}-1.x86_64.rpm
          overwrite: true

  build-docker:
    name: "Build & Package (Docker)"
    runs-on: ubuntu-latest
    needs: [ release-please ]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    env:
      GH_TOKEN: ${{ github.token }}
      SEMVER: "${{ needs.release-please.outputs.tag_name }}"
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker
        uses: docker/build-push-action@v6
        with:
          context: docker
          push: true
          tags: |
            ${{ secrets.DOCKER_USER }}/awsmock:${{ env.SEMVER }}
            ${{ secrets.DOCKER_USER }}/awsmock:latest
          build-args: |
            GH_TOKEN=${{ env.GH_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    name: Publish Release & Attach Installers
    runs-on: ubuntu-latest
    needs: [ release-please, build-linux, build-macos, build-windows-msi ]
    env:
      SEMVER: "${{ needs.release-please.outputs.tag_name }}"
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download Windows installer
        uses: actions/download-artifact@v7
        with:
          name: installer-windows
          path: artifacts/windows

      - name: Download macOS installer
        uses: actions/download-artifact@v7
        with:
          name: installer-macos
          path: artifacts/macos

      - name: Download Linux Debian package
        uses: actions/download-artifact@v7
        with:
          name: deb-package-linux
          path: artifacts/linux

      - name: Download Linux RPM package
        uses: actions/download-artifact@v7
        with:
          name: rpm-package-linux
          path: artifacts/linux

      - name: Create GitHub Release (attach installers)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows/*.exe
            artifacts/macos/*.tgz
            artifacts/linux/*.deb
            artifacts/linux/*.rpm
          name: Release ${{ env.SEMVER }}
          tag_name: ${{ env.SEMVER }}
          body: "Automated release for ${{ env.SEMVER }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_AUTH_TOKEN }}

  deploy:
    needs:
      - publish
    runs-on: ubuntu-latest
    env:
      SEMVER: "${{ needs.release-please.outputs.tag_name }}"
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Create site folder
        run: |
          mkdir public
          cp ./artifacts/installer-windows/*.exe public/ || true
          cp ./artifacts/installer-macos/*.tgz public/ || true
          cp ./artifacts/deb-package-linux/*.deb public/ || true
          cp ./artifacts/rpm-package-linux/*.rpm public/ || true
          cp .github/pages/index.html public/index.html || true
          find . -ls

      - name: Generate files.json
        run: |
          cd public
          echo '{ "downloads": [' > files.json
          first=true
          for f in *.{exe,deb,rpm,tgz}; do
            [ -f "$f" ] || continue
            if [ "$first" = true ]; then
              first=false
            else
              echo "," >> files.json
            fi
            size=$(stat -c%s "$f")
            sha=$(sha256sum "$f" | cut -d" " -f1)
            echo "  {\"file\": \"$f\", \"size\": $size, \"sha256\": \"$sha\"}" >> files.json
          done
          echo "]}" >> files.json

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4